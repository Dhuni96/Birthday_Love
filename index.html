<!DOCTYPE html>
<html>
<head>
  <title>Happy Birthday My Baby ❤️❤️</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      text-align: center;
      color: white;
      background: black;
      overflow: hidden;
    }

    .overlay {
      padding: 20px;
    }

    /* ENVELOPE */
    #envelope {
      margin-top: 100px;
      cursor: pointer;
    }

    #letter {
      display: none;
      animation: fadeIn 2s;
    }

    @keyframes fadeIn {
      from {opacity: 0;}
      to {opacity: 1;}
    }

    h1 {
      font-size: 35px;
    }

    #typewriter {
      font-size: 18px;
      max-width: 700px;
      margin: auto;
      white-space: pre-line;
    }

    button {
      margin: 10px;
      padding: 12px 20px;
      border-radius: 25px;
      border: none;
      background: white;
      color: #ff4d6d;
      cursor: pointer;
    }

    #kiss {
      display: none;
      font-size: 30px;
    }

    /* SLIDESHOW */
    .slideshow {
      margin-top: 20px;
    }

    .slideshow img {
      width: 200px;
      height: 200px;
      border-radius: 20px;
      display: none;
    }

    .active {
      display: block;
      margin: auto;
    }

    /* HEARTS */
    .heart {
      position: absolute;
      color: pink;
      animation: float 3s linear forwards;
    }

    @keyframes float {
      from {transform: translateY(0);}
      to {transform: translateY(-200px); opacity: 0;}
    }
  </style>
</head>

<body onclick="createHearts(event)">

<div class="overlay">

  <!-- ENVELOPE -->
  <div id="envelope" onclick="openLetter()">
    <h2>💌 Click to open your birthday letter baby</h2>
  </div>

  <!-- LETTER CONTENT -->
  <div id="letter">

    <h1>🎂 Happy Birthday My Baby ❤️❤️</h1>

    <div id="typewriter"></div>

    <button onclick="showKiss()">Send Kiss 💋</button>
    <div id="kiss">😘😘😘😘💖</div>

    <br>

    <!-- VOICE MESSAGE -->
    <h3>🎤 A message from me</h3>
    <audio controls>
      <source src="Voice 0031.mp3" type="audio/mpeg">
    </audio>

    <!-- SLIDESHOW -->
    <div class="slideshow">
      <img class="slide active" src="https://github.com/Dhuni96/Birthday_Love/blob/main/Pic%201.jpg?raw=true
">
      <img class="slide" src="https://github.com/Dhuni96/Birthday_Love/blob/main/Pic%202.jpg?raw=true">
      <img class="slide" src="https://github.com/Dhuni96/Birthday_Love/blob/main/Pic%203.jpg?raw=true">
    </div>

  </div>

</div>

<audio autoplay loop>
  <source src="https://www.bensound.com/bensound-music/bensound-love.mp3" type="audio/mpeg">
</audio>

<script>
  // OPEN LETTER
  function openLetter() {
    document.getElementById("envelope").style.display = "none";
    document.getElementById("letter").style.display = "block";
  }

  // TYPEWRITER
  const text = `My darling Baby ❤️

From my little "chingu"... to my forever "baby❤️"...
You became my whole world. 💕

Even though we are far apart,
my love for you grows stronger every day.

I miss you so much...
I wish I could hug you tight and give you endless kisses. 😘

You are my everything.

Happy Birthday my love...
I LOVE YOU FOREVER ❤️`;

  let i = 0;
  function typing() {
    if (i < text.length) {
      document.getElementById("typewriter").innerHTML += text.charAt(i);
      i++;
      setTimeout(typing, 40);
    }
  }

  // START typing after open
  function startTyping() {
    typing();
  }

  document.getElementById("envelope").addEventListener("click", startTyping);

  // KISS
  function showKiss() {
    document.getElementById("kiss").style.display = "block";
  }

  // HEARTS
  function createHearts(e) {
    for (let i = 0; i < 8; i++) {
      let heart = document.createElement("div");
      heart.className = "heart";
      heart.innerHTML = "💖";
      heart.style.left = e.clientX + "px";
      heart.style.top = e.clientY + "px";
      document.body.appendChild(heart);
      setTimeout(() => heart.remove(), 3000);
    }
  }

  // SLIDESHOW
  let slideIndex = 0;
  const slides = document.getElementsByClassName("slide");

  setInterval(() => {
    for (let i = 0; i < slides.length; i++) {
      slides[i].classList.remove("active");
    }
    slideIndex = (slideIndex + 1) % slides.length;
    slides[slideIndex].classList.add("active");
  }, 2000);

</script>

</body>
</html>
